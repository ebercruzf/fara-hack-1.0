# Fara-Hack Web — Nginx config
# Serves the Angular 20 production bundle on port 80, proxies
# /api and /ws to the fara-hack backend container on the compose network.

upstream fara_hack_backend {
    server fara-hack:8080;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # [2026-04-09] Allow large multipart uploads for the multimodal
    # bug-report endpoint (POST /api/triage/report). The vision adapter
    # (LlmTriageClient) accepts screenshots as base64 inside the JSON
    # body — base64 inflates the payload by ~33%, so a 1.5 MB PNG
    # becomes ~2 MB on the wire. We set the limit at 10 MB to give
    # generous headroom for typical error captures (1-3 MB) without
    # opening the door to abuse. Default Nginx is 1 MB which was
    # blocking submissions with HTTP 413 Request Entity Too Large.
    client_max_body_size 10m;

    # Gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ─── Angular SPA — fall back to index.html for client routing ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── REST proxy to backend ─────────────────────────────────────
    location /api/ {
        proxy_pass http://fara_hack_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── WebSocket proxy (Reasoning Trace) ─────────────────────────
    location /ws/ {
        proxy_pass http://fara_hack_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Cache static assets aggressively ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
