name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '25'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            jpackage_type: dmg
          - os: ubuntu-22.04
            platform: linux-x64
            jpackage_type: deb
          - os: windows-2022
            platform: windows-x64
            jpackage_type: msi
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # The fara-hack module depends on fararoni-core. We expect the
      # fararoni-core artifact to already be available in Maven Central
      # OR via a build step that publishes it. For the hackathon, we
      # ship a fallback that builds core from a sibling checkout if the
      # workflow is run from the parent CoreVersion2 directory.
      #
      # If you publish fara-hack-1.0 as a standalone repo, you must
      # either (a) publish fararoni-core to Maven Central first, or
      # (b) include fararoni-core as a git submodule and build it here.
      # ----------------------------------------------------------------
      - name: Maven package (fat jar)
        shell: bash
        run: mvn -B package -DskipTests

      - name: Run tests
        shell: bash
        run: mvn -B test

      # ----------------------------------------------------------------
      # jpackage — produces a self-contained installer with embedded
      # JRE 25. End users do NOT need Java installed.
      # ----------------------------------------------------------------
      - name: Build self-contained installer with jpackage
        shell: bash
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release jpackage-input
          cp target/fara-hack-1.0.jar jpackage-input/

          jpackage \
            --type ${{ matrix.jpackage_type }} \
            --name FaraHack \
            --app-version "${VERSION}" \
            --description "Fara-Hack 1.0 — Sovereign Agentic Runtime" \
            --vendor "Fararoni" \
            --copyright "Copyright (c) 2026 Eber Cruz Fararoni" \
            --input jpackage-input \
            --main-jar fara-hack-1.0.jar \
            --main-class dev.fararoni.core.hack.HackBootstrap \
            --java-options "--enable-preview" \
            --java-options "-Xms128m" \
            --java-options "-Xmx512m" \
            --dest release \
            || echo "jpackage failed (likely missing platform-specific tooling); falling back to fat jar"

          # Always include the fat jar as a backup artifact
          cp target/fara-hack-1.0.jar "release/fara-hack-${VERSION}-${{ matrix.platform }}.jar"

          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fara-hack-${{ matrix.platform }}
          path: release/*
          if-no-files-found: warn

  # =================================================================
  # Release — collect all platform artifacts and publish
  # =================================================================
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: false
